name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: zhenyarus39
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=ARG HERMES_VERSION=)v[0-9]+\.[0-9]+\.[0-9]+' hermes-agent/Dockerfile)
          echo "VERSION=${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push amd64
        run: |
          docker buildx build --push \
            --platform linux/amd64 \
            --tag ghcr.io/zhenyarus39/hermes-agent/linux-amd64:${{ steps.version.outputs.version }} \
            --build-arg HERMES_VERSION=${{ steps.version.outputs.version }} \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.23 \
            hermes-agent/

      - name: Build and push aarch64
        run: |
          docker buildx build --push \
            --platform linux/aarch64 \
            --tag ghcr.io/zhenyarus39/hermes-agent/linux-aarch64:${{ steps.version.outputs.version }} \
            --build-arg HERMES_VERSION=${{ steps.version.outputs.version }} \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/aarch64-base:3.23 \
            hermes-agent/

      - name: Create and push manifest list
        run: |
          docker manifest create \
            ghcr.io/zhenyarus39/hermes-agent:${{ steps.version.outputs.version }} \
            ghcr.io/zhenyarus39/hermes-agent/linux-amd64:${{ steps.version.outputs.version }} \
            ghcr.io/zhenyarus39/hermes-agent/linux-aarch64:${{ steps.version.outputs.version }}
          docker manifest annotate \
            ghcr.io/zhenyarus39/hermes-agent:${{ steps.version.outputs.version }} \
            ghcr.io/zhenyarus39/hermes-agent/linux-amd64:${{ steps.version.outputs.version }} \
            --os linux --arch amd64
          docker manifest annotate \
            ghcr.io/zhenyarus39/hermes-agent:${{ steps.version.outputs.version }} \
            ghcr.io/zhenyarus39/hermes-agent/linux-aarch64:${{ steps.version.outputs.version }} \
            --os linux --arch arm64
          docker manifest push --purge \
            ghcr.io/zhenyarus39/hermes-agent:${{ steps.version.outputs.version }}
