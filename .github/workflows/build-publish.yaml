name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: zhenyarus39
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: |
          cd hermes-agent
          VERSION=$(grep -oP '(?<=ARG HERMES_VERSION=)v[0-9]+\.[0-9]+\.[0-9]+' Dockerfile)
          echo "VERSION=${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Debug build
        run: |
          echo "=== DEBUG ==="
          echo "pwd: $(pwd)"
          echo "ls hermes-agent:"
          ls -la hermes-agent/ || echo "NOT FOUND"
          echo "Docker version:"
          docker version
          echo "Buildx version:"
          docker buildx version
          echo "=== ATTEMPTING BUILD ==="
          cd hermes-agent
          docker buildx build --push \
            --platform linux/amd64 \
            --tag ghcr.io/zhenyarus39/hermes-agent:linux-amd64:${{ env.VERSION }} \
            --build-arg HERMES_VERSION=${{ env.VERSION }} \
            . 2>&1 || echo "BUILD FAILED with code $?"
