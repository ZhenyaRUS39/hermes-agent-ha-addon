name: Build and Publish Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.23
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:3.23
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Hermes version
        id: hermes-version
        run: |
          # Extract version from Dockerfile ARG
          VERSION=$(grep -oP '(?<=ARG HERMES_VERSION=)v[0-9]+\.[0-9]+' Dockerfile)
          echo "Hermes version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zhenyarus39/hermes-agent
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=${{ steps.hermes-version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ghcr.io/zhenyarus39/hermes-agent:${{ github.sha }}
            ghcr.io/zhenyarus39/hermes-agent/linux-${{ matrix.arch }}:${{ github.sha }}
            ghcr.io/zhenyarus39/hermes-agent:${{ steps.hermes-version.outputs.version }}
            ghcr.io/zhenyarus39/hermes-agent/linux-${{ matrix.arch }}:${{ steps.hermes-version.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            HERMES_VERSION=${{ steps.hermes-version.outputs.version }}

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Hermes Agent HA Addon ${{ github.ref }}
          draft: false
          prerelease: false
