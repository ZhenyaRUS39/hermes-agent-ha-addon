name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: |
          cd hermes-agent
          VERSION=$(grep -oP '(?<=ARG HERMES_VERSION=)v[0-9]+\.[0-9]+\.[0-9]+' Dockerfile)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build and push multi-platform
        run: |
          cd hermes-agent
          docker buildx build --push             --platform linux/${{ matrix.arch }}             --tag ghcr.io/${{ github.actor }}/hermes-agent:${{ env.VERSION }}             --tag ghcr.io/${{ github.actor }}/hermes-agent/linux-${{ matrix.arch }}:${{ env.VERSION }}             --build-arg HERMES_VERSION=${{ env.VERSION }}             --build-arg BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.23             .
