name: Build and Publish Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          # Extract version WITH v prefix (for git clone)
          VERSION=$(grep -oP '(?<=ARG HERMES_VERSION=)v?[0-9]+\.[0-9]+\.[0-9]+' hermes_agent/Dockerfile)
          # Strip 'v' for image tags (e.g. v2026.4.23 -> 2026.4.23)
          IMAGE_VERSION=${VERSION#v}
          echo "VERSION=${VERSION}"
          echo "IMAGE_VERSION=${IMAGE_VERSION}"
          echo "version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push amd64
        run: |
          docker buildx build --push \
            --platform linux/amd64 \
            --tag ghcr.io/zhenyarus39/hermes-agent:linux-amd64-${{ steps.version.outputs.IMAGE_VERSION }} \
            --build-arg HERMES_VERSION=${{ steps.version.outputs.VERSION }} \
            -f hermes_agent/Dockerfile \
            hermes_agent/

      - name: Build and push aarch64
        run: |
          docker buildx build --push \
            --platform linux/aarch64 \
            --tag ghcr.io/zhenyarus39/hermes-agent:linux-aarch64-${{ steps.version.outputs.IMAGE_VERSION }} \
            --build-arg HERMES_VERSION=${{ steps.version.outputs.VERSION }} \
            -f hermes_agent/Dockerfile \
            hermes_agent/

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/zhenyarus39/hermes-agent:${{ steps.version.outputs.IMAGE_VERSION }} \
            ghcr.io/zhenyarus39/hermes-agent:linux-amd64-${{ steps.version.outputs.IMAGE_VERSION }} \
            ghcr.io/zhenyarus39/hermes-agent:linux-aarch64-${{ steps.version.outputs.IMAGE_VERSION }}
