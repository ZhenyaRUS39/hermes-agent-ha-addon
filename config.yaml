name: "Hermes Agent"
version: "1.0.0"
slug: hermes-agent-wrapper
description: "AI Agent with advanced tool-calling — integrated with Home Assistant via HA API"
url: "https://github.com/ZhenyaRUS39/hermes-agent-ha-addon"
startup: services
timeout: 60
wait_timeout: 120
arch:
  - aarch64
  - amd64
homeassistant_api: true
hassio_api: true
host_network: true
init: false
map:
  - addon_config:rw
  - homeassistant_config:rw
  - share:rw
  - ssl:rw
  - backup:rw
ingress: true
ingress_port: 8000
ingress_stream: true
panel_icon: mdi:robot
panel_title: "Hermes AI"
options:
  log_level: info
  update_on_start: false
  git_branch: master
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  update_on_start: bool?
  git_branch: str?
image: ghcr.io/zhenyarus39/hermes-agent-linux-{arch}
# Note: documentation_url is set in config.yaml header
